<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catering Co. Menu</title>
</head>
<body>

    <nav><h1>Catering Co.</h1></nav>

    <div id="menu-items"></div>

    <div id="cart-section" style="margin-top:20px; padding:15px; border:2px dashed #25D366;">
        <h3>Your Order</h3>
        <div id="cart-items"></div>
        <button id="checkout-btn" onclick="sendOrder()" style="display:none;">Checkout on WhatsApp</button>
    </div>

    <div class="admin-panel" style="display:none; margin-top:50px; padding:20px; border:1px solid #000;">
        <h2>Admin: Update Menu</h2>
        <input id="itemName" placeholder="Item Name">
        <input id="itemPrice" placeholder="Price">
        <input id="itemImg" placeholder="Image URL">
        <button onclick="addItem()">Add Item</button>

        <div id="admin-orders" style="margin-top:30px; background:#f9f9f9; padding:20px;">
            <h3>Incoming Orders</h3>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
