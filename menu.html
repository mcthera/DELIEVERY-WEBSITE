<body>

 <nav>
<div class="nav-header">
    <h1>Catering Co.</h1>

</div>

    <section>
        <div id="menu-items"></div>

        <div id="cart-section">
            <h3>Your Order</h3>
            <div id="cart-items"></div>
            <div id="checkout-form" style="margin-top: 15px;">
    <input type="text" id="custName" placeholder="Your Name" required><br>
    <input type="text" id="custLoc" placeholder="Delivery Location" required><br>
    <input type="tel" id="custPhone" placeholder="Phone Number" required><br>
    <textarea id="custComment" placeholder="Special instructions (e.g., allergies, delivery notes)"></textarea>
    <input type="date" id="orderDate"><br>
</div>
            <button id="checkout-btn" onclick="sendOrder()" style="display:none;" class="btn-whatsapp">Checkout on WhatsApp</button>
        </div>

        <div class="admin-panel">
            <h2>Admin: Update Menu</h2>
            <input id="itemName" placeholder="Item Name">
            <input id="itemPrice" placeholder="Price">
            <input id="itemImg" placeholder="Image URL">
            <button onclick="addItem()">Add Item</button>

            <div id="admin-orders">
                <h3>Incoming Orders</h3>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Catering Co.</p>
    </footer>
    <div id="toast" style="position:fixed; bottom:20px; right:20px; background:#333; color:white; padding:15px; border-radius:8px; display:none; z-index:1000;">
    Item added to cart!
</div>
